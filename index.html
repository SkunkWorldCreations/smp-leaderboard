<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMP PvP Ranked Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
  }
  header {
    padding: 25px;
    text-align: center;
    background: #161b22;
    border-bottom: 1px solid #30363d;
  }
  h1 {
    margin: 0;
    font-size: 2rem;
  }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px;
  }
  .tab {
    padding: 10px 18px;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
  }
  .tab.active {
    background: #30363d;
  }
  main {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 15px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    padding: 12px;
    border-bottom: 1px solid #30363d;
  }
  th {
    background: #21262d;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
  tr:hover {
    background: #1c2128;
  }
  .rank {
    color: #8b949e;
  }
  .elo {
    font-weight: bold;
    color: #f1c40f;
  }
  .tier {
    font-size: 0.8rem;
    color: #58a6ff;
  }
</style>
</head>
<body>

<header>
  <h1>SMP PvP Ranked Leaderboard</h1>
</header>

<div class="tabs" id="tabs"></div>

<main>
  <table id="board">
    <thead>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>ELO</th>
        <th>Wins</th>
        <th>Losses</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</main>

<script>
const tiers = [
  { min: 1850, name: "GT1" },
  { min: 1800, name: "GT2" },
  { min: 1750, name: "GT3" },
  { min: 1700, name: "GT4" },
  { min: 1650, name: "GT5" },
  { min: 1600, name: "HT1" },
  { min: 1550, name: "HT2" },
  { min: 1500, name: "HT3" },
  { min: 1450, name: "HT4" },
  { min: 1400, name: "HT5" },
  { min: 1350, name: "MT1" },
  { min: 1300, name: "MT2" },
  { min: 1250, name: "MT3" },
  { min: 1200, name: "MT4" },
  { min: 1150, name: "MT5" },
  { min: 1100, name: "LT1" },
  { min: 1050, name: "LT2" },
  { min: 1000, name: "LT3" },
  { min: 950, name: "LT4" },
  { min: 0, name: "LT5" }
];

function getTier(elo) {
  return tiers.find(t => elo >= t.min).name;
}

let players = [];
let currentMode = "overall";

fetch("leaderboard.json")
  .then(r => r.json())
  .then(data => {
    players = data;
    setupTabs();
    render();
  });

function setupTabs() {
  const tabs = document.getElementById("tabs");
  const modes = ["overall", ...Object.keys(players[0].kits)];

  modes.forEach(mode => {
    const tab = document.createElement("div");
    tab.className = "tab" + (mode === "overall" ? " active" : "");
    tab.textContent = mode.toUpperCase();
    tab.onclick = () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentMode = mode;
      render();
    };
    tabs.appendChild(tab);
  });
}

function render() {
  const tbody = document.querySelector("#board tbody");
  tbody.innerHTML = "";

  const sorted = [...players].sort((a, b) => {
    const aElo = currentMode === "overall" ? a.overall : a.kits[currentMode];
    const bElo = currentMode === "overall" ? b.overall : b.kits[currentMode];
    return bElo - aElo;
  });

  sorted.forEach((p, i) => {
    const elo = currentMode === "overall" ? p.overall : p.kits[currentMode];
    const row = document.createElement("tr");
    row.innerHTML = `
      <td class="rank">${i + 1}</td>
      <td>
        ${p.username}<br>
        <span class="tier">${getTier(elo)}</span>
      </td>
      <td class="elo">${elo}</td>
      <td>${p.wins}</td>
      <td>${p.losses}</td>
    `;
    tbody.appendChild(row);
  });
}
</script>

</body>
</html>
